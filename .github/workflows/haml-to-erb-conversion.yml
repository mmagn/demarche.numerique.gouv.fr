name: Daily HAML to ERB Conversion

on:
  schedule:
    - cron: '0 7 * * 1-5' # 7 UTC = 9 AM Paris (CET), weekdays only
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Find and convert first convertible HAML file
        id: convert
        run: |
          # Find all HAML files, excluding worktrees
          HAML_FILES=$(find . -name "*.haml" -not -path "./.worktrees/*" | sort)

          if [ -z "$HAML_FILES" ]; then
            echo "No HAML files found"
            echo "converted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONVERTED=false

          for file in $HAML_FILES; do
            echo "Trying dry-run on: $file"
            if bundle exec haml_to_erb "$file" --dry-run 2>/dev/null; then
              echo "Dry-run passed for: $file"
              echo "Converting: $file"
              bundle exec haml_to_erb "$file" --check --delete --force
              CONVERTED=true
              echo "file=$file" >> "$GITHUB_OUTPUT"
              echo "converted=true" >> "$GITHUB_OUTPUT"
              break
            else
              echo "Dry-run failed for: $file, skipping"
            fi
          done

          if [ "$CONVERTED" = false ]; then
            echo "No HAML file could be converted"
            echo "converted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.convert.outputs.converted == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "refactor: convert ${{ steps.convert.outputs.file }} from HAML to ERB"
          title: "Tech: convertir ${{ steps.convert.outputs.file }} de HAML en ERB"
          body: |
            ## Summary
            - Conversion automatique de `${{ steps.convert.outputs.file }}` de HAML en ERB via `haml_to_erb --check --delete`

            ## Test plan
            - [ ] Vérifier que le rendu ERB est identique au HAML original
            - [ ] Lancer les tests liés au composant/vue converti
            - [ ] Vérifier le lint ERB (`bun lint:herb`)

            🤖 Généré automatiquement par le workflow `haml-to-erb-conversion`
          branch: auto/haml-to-erb-conversion
          delete-branch: true
