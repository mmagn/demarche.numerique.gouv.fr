  summary:
    title: À quoi servent ces suggestions ?
    improve_label_html: |
      <p>Cette étape propose une mise à jour des libellés de champs détectés comme <strong>trop longs</strong>, en <strong>majuscules</strong>
      ou <strong>difficiles à comprendre</strong>.</p>
      <p>Les suggestions visent à rendre chaque champ plus clair pour l’usager.</p>

    improve_structure_html: |
      <p>Cette étape propose des suggestions <strong>d’amélioration de la structure du formulaire
      (réorganisation des champs, ajout de sections)</strong> pour le rendre plus clair et lisible pour l’usager.</p>

    improve_types_html: |
      <p>Cette étape propose d’utiliser <strong>les types de champs appropriés</strong> (adresse électronique, adresse, etc.)
      pour faciliter le remplissage des champs par l’usager et fiabiliser le recueil des données pour l’administration.
      Certains champs spécialisés permettent de récupérer automatiquement des données complémentaires
      (exemple : le champ « Adresse » fournit directement les données « Commune », « Département », etc.).</p>

    cleaner_html: |
      <p>Cette étape applique le principe <strong>« Dites-le nous une fois »</strong> :
      l’administration ne doit pas redemander des informations déjà collectées ou connues par ailleurs.</p>
      <p>Les suggestions proposent de supprimer des champs qui demandent une information déjà disponible
      via un autre champ du formulaire (exemple : suppression d’un champ « Commune » quand un champ « Adresse »
      est présent dans le formulaire et permet de récupérer automatiquement la commune).</p>
  no_suggestion_html: |
    🎉 <strong>Félicitations</strong>, nous n’avons aucune suggestion
    pertinente à proposer sur ce thème, ce qui signifie probablement que
    votre formulaire est déjà de qualité !
